# ╔══════════════════════════════════════════════════════════════════════╗
# ║  secrets.yaml — Sentry baseline pull                                    ║
# ║                                                                          ║
# ║  ⭐ THIS FILE IN ONE SENTENCE                                            ║
# ║  Per-folder declarative manifest of every secret the Sentry-baseline    ║
# ║  cron in this folder needs, in the schema CONSTRAINTS D7 + D8 require. ║
# ║                                                                          ║
# ║  📖 EXPLAINED FOR A NON-PROGRAMMER                                       ║
# ║  This file lists secret NAMES + metadata. It contains zero secret       ║
# ║  VALUES — values live in macOS Keychain (local) and GitHub Secrets      ║
# ║  (CI). Tooling (template's validate-secrets.sh, lint workflows) reads  ║
# ║  this file to confirm every secret the code references is declared,    ║
# ║  and that the right value source exists in each environment.           ║
# ║                                                                          ║
# ║  🔗 HOW IT FITS                                                          ║
# ║  - Read by:    future template scripts (validate-secrets.sh,            ║
# ║                gen-env-example.sh, sync-github-secrets.sh) once          ║
# ║                Session 2 builds them per CONSTRAINTS D8.                ║
# ║  - Cluster manifest: cluster-level secrets (ones used by multiple       ║
# ║                services) live in a different file at                    ║
# ║                bootstrap-scripts-for-the-v2-docker-swarm-cluster/       ║
# ║                secrets-manifest.yaml. This folder has only one local-   ║
# ║                only secret so it stays here.                            ║
# ║  - Schema:     follows CONSTRAINTS D8 — name, description, required_in, ║
# ║                source, rotation_policy, consumed_by, classification.    ║
# ╚══════════════════════════════════════════════════════════════════════╝

# Folder this manifest covers (so a future tool can locate scope by file).
folder_path: yral-rishi-agent-plan-and-discussions/latency-baseline-capture-from-live-services-the-numbers-v2-must-beat/scripts

# Top-level constraints this manifest serves — referenced by lint tooling
# when explaining a violation back to the PR author.
relevant_constraints:
  - A7    # Sentry host = sentry.rishi.yral.com
  - D1    # GitHub Secrets primary, Vault for shared, never in code
  - D7    # Declarative secrets manifest pattern (cluster-level)
  - D8    # Per-folder secrets.yaml manifest (this file)
  - I7    # Sentry API access pre-authorized 2026-04-24

secrets:

  - name: SENTRY_AUTH_TOKEN
    description: >
      User auth token for sentry.rishi.yral.com Sentry API. Used by
      pull-sentry-baseline.py to read aggregated p50/p95/p99 latency
      and failure-rate counts for the live yral-chat-ai project. Per
      I7, aggregated reads (no raw event bodies) are pre-authorized;
      no per-run Rishi YES needed.

    # Whether this secret must be set in each environment for the code
    # in this folder to function. "local" is Rishi's laptop, where the
    # launchd cron actually runs.
    required_in:
      local: true        # The cron runs on Rishi's laptop, so yes.
      ci: false          # CI does not run this script — coordinator
                         # exports baseline data into the repo manually.
      production: false  # No production deploy of this script —
                         # baseline pull is a development-time-only job.

    # Where the value comes from in each environment.
    source:
      local:
        type: macos_keychain
        keychain_account_name: dolr-ai
        keychain_service_name: SENTRY_AUTH_TOKEN
        access_command: |
          security find-generic-password -a dolr-ai \
              -s SENTRY_AUTH_TOKEN -w
      ci:
        # Not used today; documented so a future migration to a CI-run
        # baseline pull has a known target name.
        type: github_secret
        github_secret_name: SENTRY_AUTH_TOKEN_FOR_BASELINE_PULL
      production:
        type: not_applicable
        reason: This script does not run in production.

    # When and how this secret rotates. Sentry tokens have no built-in
    # expiry; rotation is event-driven (suspected leak, member offboard).
    rotation_policy:
      cadence: on_demand
      triggers:
        - suspected_token_leak
        - rishi_offboards_a_team_member_with_sentry_access
        - sentry_self_hosted_major_upgrade
      rotation_runbook: |
        1. In sentry.rishi.yral.com → Account → API → Auth Tokens,
           create a new token with scopes: event:read, project:read.
        2. Update macOS Keychain:
              security add-generic-password -U -a dolr-ai \
                  -s SENTRY_AUTH_TOKEN -w '<new-token>' \
                  -T /usr/bin/security
        3. Verify next 9 a.m. run succeeds (or kickstart manually):
              launchctl kickstart -k gui/$(id -u)/com.dolr-ai.\
                  yral-rishi-agent.pull-sentry-baseline
        4. Revoke the old token in the Sentry UI.

    # Files that reference this secret. Lint tooling cross-checks this
    # list against actual git-grep results — drift = lint failure.
    consumed_by:
      - yral-rishi-agent-plan-and-discussions/latency-baseline-capture-from-live-services-the-numbers-v2-must-beat/scripts/pull-sentry-baseline.py

    # Risk classification per CONSTRAINTS D8 schema.
    classification:
      blast_radius: read_only_aggregated_observability
      access_pattern: daily_cron_morning
      sensitivity: medium
      notes: |
        Token only allows READ access to Sentry aggregates — never raw
        event bodies (per A14). Compromise lets an attacker observe
        latency trends; it does not let them exfiltrate user data.

