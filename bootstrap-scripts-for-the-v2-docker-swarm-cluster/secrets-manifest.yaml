# RELATED FILES
# ─────────────
# - cluster.hosts.yaml (next deliverable)
#       Shape-only cluster topology that consumes RISHI_N_PUBLIC_IPV4
#       secrets at render time per CONSTRAINTS C6.
# - scripts/node-bootstrap.sh
#       Reads HETZNER_CI_SSH_PRIVATE_KEY + RISHI_N_PUBLIC_IPV4 + GHCR_PULL_TOKEN.
# - scripts/patroni-install.sh, redis-sentinel-install.sh, langfuse-install.sh
#       Each consumes the secrets listed in its consumed_by entries above.
# - Per-service secrets.yaml in each service folder (CONSTRAINTS D8)
#       For secrets that ONE service uses (e.g. SENTRY_AUTH_TOKEN for the
#       baseline pull, OpenAI keys for orchestrator). Those do not appear
#       in this cluster-level file.
