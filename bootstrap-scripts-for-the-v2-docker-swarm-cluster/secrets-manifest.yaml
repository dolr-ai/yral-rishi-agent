# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  secrets-manifest.yaml — cluster-level                                      ║
# ║                                                                              ║
# ║  ⭐ THIS FILE IN ONE SENTENCE                                                ║
# ║  Single declarative source of truth for every cluster-level secret the     ║
# ║  rishi-4/5/6 Swarm cluster needs (Postgres roles, Redis password,         ║
# ║  Langfuse keys, S3 backup creds, Google Chat webhook, Hetzner SSH key,   ║
# ║  GHCR pull token), in the schema CONSTRAINTS D7 requires.                  ║
# ║                                                                              ║
# ║  📖 EXPLAINED FOR A NON-PROGRAMMER                                           ║
# ║  This file lists secret NAMES + metadata. It contains zero secret VALUES. ║
# ║  Values live in GitHub Secrets (per CONSTRAINTS D1). Bootstrap and        ║
# ║  install scripts read this manifest to know which secrets they need;     ║
# ║  the CI workflow `validate-secrets.sh` (future deliverable owned by      ║
# ║  Session 2's template work) refuses to deploy if any secret listed here   ║
# ║  is missing in the target environment.                                     ║
# ║                                                                              ║
# ║  This is the CLUSTER-level manifest — secrets that multiple services      ║
# ║  share. Per-service secrets live in each service folder's secrets.yaml    ║
# ║  per CONSTRAINTS D8.                                                       ║
# ║                                                                              ║
# ║  🔗 HOW IT FITS                                                              ║
# ║  - Read by:    node-bootstrap.sh (rishi-deploy SSH keys),                  ║
# ║                patroni-install.sh (Postgres superuser + replication),      ║
# ║                redis-sentinel-install.sh (Redis password),                  ║
# ║                langfuse-install.sh (Langfuse encryption + Postgres URL),  ║
# ║                caddy-swarm-service.yml (no secrets currently — listed for ║
# ║                future ACME migration),                                     ║
# ║                future backup.sh (Hetzner S3 + Backblaze B2 creds).        ║
# ║  - Validated:  CI workflow `lint-secrets-hygiene.yml` (Session 2's        ║
# ║                deliverable) cross-checks every consumed_by entry against ║
# ║                actual git-grep results; drift = lint failure.              ║
# ║  - Schema:     follows CONSTRAINTS D7 — name, description, required_in,   ║
# ║                source per env, rotation_policy, consumed_by[code-files],  ║
# ║                classification[blast_radius, access_pattern, sensitivity]. ║
# ║                                                                              ║
# ║  ⚠️ DRAFT — NO SECRETS POPULATED YET                                          ║
# ║  Per agent spec + CONSTRAINTS A13, real secret values land in GitHub      ║
# ║  Secrets only after Rishi types YES on the Day 4-6 cluster provisioning   ║
# ║  go-ahead. This manifest just declares what will need to exist by then.   ║
# ║                                                                              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Folder this manifest covers — the cluster-bootstrap root.
folder_path: bootstrap-scripts-for-the-v2-docker-swarm-cluster

# CONSTRAINTS rows this manifest serves — surfaced by lint tooling when
# explaining a violation back to the PR author.
relevant_constraints:
  - A2     # rishi-1/2/3 carve-out — SSH key pattern + deploy user
  - C6     # No literal IPs in code — values live in GitHub Secrets
  - C8     # Canonical SSH key + rishi-deploy user across the fleet
  - D1     # GitHub Secrets primary; Vault for shared only
  - D2     # Three-layer backup strategy (L2 + L3 require S3 creds)
  - D6     # Alertmanager destination = Google Chat webhook
  - D7     # Declarative secrets manifest pattern (this file)
  - F3     # Schema-per-service on shared Patroni cluster
  - F13    # GHCR for container images (pull token)


secrets:

  # ─────────── SSH + node-bootstrap secrets ───────────────────────────────

  - name: HETZNER_CI_SSH_PRIVATE_KEY
    description: >
      Private half of `~/.ssh/rishi-hetzner-ci-key`, the canonical SSH key
      that authenticates as the `deploy` user on rishi-1/2 and as
      `rishi-deploy` on rishi-4/5/6. Used by GitHub Actions runners to
      SSH into the cluster for deploys + rishi-1/2 Caddy snippet adds.
    required_in:
      local: false      # Rishi already has this on his laptop in ~/.ssh
      ci: true          # Runners use it for deploys
      production: true  # Same key, all environments
    source:
      ci:
        type: github_secret
        github_secret_name: HETZNER_CI_SSH_PRIVATE_KEY
      production:
        type: github_secret
        github_secret_name: HETZNER_CI_SSH_PRIVATE_KEY
      local:
        type: filesystem
        path: ~/.ssh/rishi-hetzner-ci-key
    rotation_policy:
      cadence: on_demand
      triggers:
        - suspected_key_compromise
        - team_member_offboarded_who_had_access
      rotation_runbook: |
        1. ssh-keygen new pair on Rishi's laptop with `-t ed25519`.
        2. Append new pubkey to authorized_keys on every node BEFORE
           removing the old one (avoid lockout).
        3. Update GitHub Secret HETZNER_CI_SSH_PRIVATE_KEY.
        4. Verify a deploy succeeds, then remove old pubkey from nodes.
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/node-bootstrap.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/redis-sentinel-install.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/langfuse-install.sh
    classification:
      blast_radius: full_cluster_root_access_via_sudo
      access_pattern: ci_deploy_per_pr_merge
      sensitivity: critical
      notes: |
        Compromise = attacker can deploy arbitrary stacks. Mitigated by
        narrow sudoers (CONSTRAINTS C8) but not eliminated.


  - name: RISHI_4_PUBLIC_IPV4
    description: >
      Public IPv4 of rishi-4 (Swarm leader manager + Patroni primary
      candidate). Surfaced as YRAL_RISHI_4_PUBLIC_IPV4 to bootstrap and
      install scripts; never hardcoded in code per CONSTRAINTS C6.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: RISHI_4_PUBLIC_IPV4 }
      production: { type: github_secret, github_secret_name: RISHI_4_PUBLIC_IPV4 }
    rotation_policy:
      cadence: on_demand
      triggers: [hetzner_ip_change, rishi_4_replaced]
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/node-bootstrap.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/cluster.hosts.yaml
    classification:
      blast_radius: cluster_topology_only
      access_pattern: read_at_render_time
      sensitivity: low
      notes: Public IP — sensitive only because it points an attacker at the cluster.


  - name: RISHI_5_PUBLIC_IPV4
    description: Public IPv4 of rishi-5 (edge node + Patroni replica). See RISHI_4_PUBLIC_IPV4.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: RISHI_5_PUBLIC_IPV4 }
      production: { type: github_secret, github_secret_name: RISHI_5_PUBLIC_IPV4 }
    rotation_policy: { cadence: on_demand, triggers: [hetzner_ip_change, rishi_5_replaced] }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/node-bootstrap.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/cluster.hosts.yaml
    classification: { blast_radius: cluster_topology_only, access_pattern: read_at_render_time, sensitivity: low }


  - name: RISHI_6_PUBLIC_IPV4
    description: Public IPv4 of rishi-6 (compute node, Langfuse host).
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: RISHI_6_PUBLIC_IPV4 }
      production: { type: github_secret, github_secret_name: RISHI_6_PUBLIC_IPV4 }
    rotation_policy: { cadence: on_demand, triggers: [hetzner_ip_change, rishi_6_replaced] }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/node-bootstrap.sh
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/cluster.hosts.yaml
    classification: { blast_radius: cluster_topology_only, access_pattern: read_at_render_time, sensitivity: low }


  # ─────────── Patroni / Postgres secrets ─────────────────────────────────

  - name: POSTGRES_SUPERUSER_PASSWORD
    description: >
      Password for the `postgres` role on the Patroni cluster. Used only
      during bootstrap and emergency recovery — every-day services use
      per-schema roles, never the superuser. See F3 (schema-per-service).
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: POSTGRES_SUPERUSER_PASSWORD }
      production: { type: github_secret, github_secret_name: POSTGRES_SUPERUSER_PASSWORD }
    rotation_policy:
      cadence: every_180_days_or_on_demand
      triggers: [suspected_compromise, scheduled_180d_rotation]
      rotation_runbook: |
        1. Generate new password (32+ chars, alphanumeric + symbols).
        2. Update GitHub Secret + Patroni leader's pgpass via REST API.
        3. Patroni propagates via DCS to replicas — no downtime.
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification:
      blast_radius: full_database_read_write
      access_pattern: bootstrap_only_then_rare
      sensitivity: critical


  - name: PATRONI_REPLICATION_PASSWORD
    description: >
      Password the Patroni replicas use to streaming-replicate from the
      leader. Different role from the superuser — has only REPLICATION
      grant, no DDL/DML access.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: PATRONI_REPLICATION_PASSWORD }
      production: { type: github_secret, github_secret_name: PATRONI_REPLICATION_PASSWORD }
    rotation_policy: { cadence: every_180_days_or_on_demand, triggers: [suspected_compromise] }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: read_only_wal_stream, access_pattern: continuous, sensitivity: high }


  - name: PATRONI_REST_API_PASSWORD
    description: >
      Password for the Patroni REST API (default port 8008) used by
      health-check probes and the leader-election admin endpoints.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: PATRONI_REST_API_PASSWORD }
      production: { type: github_secret, github_secret_name: PATRONI_REST_API_PASSWORD }
    rotation_policy: { cadence: every_180_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: cluster_topology_change, access_pattern: rare, sensitivity: high }


  # ─────────── Redis Sentinel secret ──────────────────────────────────────

  - name: REDIS_PRIMARY_PASSWORD
    description: >
      Single shared Redis password set via `requirepass`/`masterauth` and
      used by every v2 service that talks to Redis through Sentinel.
      Used for both the primary and replica (Sentinel forwards auth).
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: REDIS_PRIMARY_PASSWORD }
      production: { type: github_secret, github_secret_name: REDIS_PRIMARY_PASSWORD }
    rotation_policy:
      cadence: every_180_days_or_on_demand
      rotation_runbook: |
        Redis 7 supports rolling password rotation via ACL — set new
        password as additional credential, redeploy services with new
        creds, then revoke the old one.
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/redis-sentinel-install.sh
    classification: { blast_radius: full_redis_read_write_including_idempotency_keys, access_pattern: continuous, sensitivity: high }


  # ─────────── Langfuse secrets ───────────────────────────────────────────

  - name: LANGFUSE_NEXTAUTH_SECRET
    description: >
      NextAuth session-signing key for the self-hosted Langfuse on
      rishi-6. Required by Langfuse's web UI; rotation invalidates all
      open admin sessions.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: LANGFUSE_NEXTAUTH_SECRET }
      production: { type: github_secret, github_secret_name: LANGFUSE_NEXTAUTH_SECRET }
    rotation_policy: { cadence: on_demand, triggers: [suspected_session_hijack] }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/langfuse-install.sh
    classification: { blast_radius: langfuse_admin_session_only, access_pattern: continuous, sensitivity: medium }


  - name: LANGFUSE_ENCRYPTION_KEY
    description: >
      32-byte hex key Langfuse uses to encrypt sensitive trace fields at
      rest in Postgres. Loss of this key = inability to read historical
      encrypted traces (no plaintext recovery).
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: LANGFUSE_ENCRYPTION_KEY }
      production: { type: github_secret, github_secret_name: LANGFUSE_ENCRYPTION_KEY }
    rotation_policy:
      cadence: never_rotated_after_first_set
      rotation_runbook: |
        Langfuse does not support online re-encryption. Rotation = export
        + re-import. Treat this key as permanent unless we accept losing
        encrypted historical traces.
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/langfuse-install.sh
    classification: { blast_radius: langfuse_encrypted_trace_decryption, access_pattern: continuous, sensitivity: critical }


  # ─────────── Backup secrets (per CONSTRAINTS D2) ────────────────────────

  - name: HETZNER_S3_ACCESS_KEY_ID
    description: >
      Hetzner Object Storage S3-compatible access key for backup
      destinations L2 (WAL-G continuous archive, 7-day) and L3 (daily
      pg_dump, 30-day) per CONSTRAINTS D2.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: HETZNER_S3_ACCESS_KEY_ID }
      production: { type: github_secret, github_secret_name: HETZNER_S3_ACCESS_KEY_ID }
    rotation_policy: { cadence: every_180_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: backup_bucket_read_write, access_pattern: continuous, sensitivity: high }


  - name: HETZNER_S3_SECRET_ACCESS_KEY
    description: Hetzner S3 secret key paired with HETZNER_S3_ACCESS_KEY_ID.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: HETZNER_S3_SECRET_ACCESS_KEY }
      production: { type: github_secret, github_secret_name: HETZNER_S3_SECRET_ACCESS_KEY }
    rotation_policy: { cadence: every_180_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: backup_bucket_read_write, access_pattern: continuous, sensitivity: high }


  - name: BACKBLAZE_B2_APPLICATION_KEY_ID
    description: >
      Backblaze B2 access key for L3 weekly offsite backup per D2.
      Separate cloud provider from L2/L3 daily so a Hetzner-wide outage
      cannot wipe both copies.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: BACKBLAZE_B2_APPLICATION_KEY_ID }
      production: { type: github_secret, github_secret_name: BACKBLAZE_B2_APPLICATION_KEY_ID }
    rotation_policy: { cadence: every_180_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: offsite_backup_read_write, access_pattern: weekly, sensitivity: high }


  - name: BACKBLAZE_B2_APPLICATION_KEY_SECRET
    description: Backblaze B2 secret paired with BACKBLAZE_B2_APPLICATION_KEY_ID.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: BACKBLAZE_B2_APPLICATION_KEY_SECRET }
      production: { type: github_secret, github_secret_name: BACKBLAZE_B2_APPLICATION_KEY_SECRET }
    rotation_policy: { cadence: every_180_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/patroni-install.sh
    classification: { blast_radius: offsite_backup_read_write, access_pattern: weekly, sensitivity: high }


  # ─────────── Alerting + observability secrets ───────────────────────────

  - name: GOOGLE_CHAT_WEBHOOK_URL
    description: >
      Google Chat incoming-webhook URL the Alertmanager + service
      breakers POST critical alerts to per CONSTRAINTS D6. Same channel
      yral-chat-ai already uses for admin notifications.
    required_in: { local: false, ci: true, production: true }
    source:
      ci: { type: github_secret, github_secret_name: GOOGLE_CHAT_WEBHOOK_URL }
      production: { type: github_secret, github_secret_name: GOOGLE_CHAT_WEBHOOK_URL }
    rotation_policy: { cadence: on_demand, triggers: [webhook_leaked, channel_renamed] }
    consumed_by:
      # Owned by Alertmanager config — Session 1 will add a separate
      # observability stack that consumes this. Listing here so the
      # secret is centrally tracked from day one.
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/observability-stack.yml
    classification: { blast_radius: spam_into_one_channel, access_pattern: alert_only, sensitivity: medium }


  # ─────────── Container registry pull (per CONSTRAINTS F13) ──────────────

  - name: GHCR_PULL_TOKEN
    description: >
      Personal access token used by Swarm nodes to pull private images
      from ghcr.io/dolr-ai/*. Set on each node via `docker login ghcr.io
      -u <username> -p <token>`. Per CONSTRAINTS F13.
    required_in: { local: false, ci: false, production: true }
    source:
      production: { type: github_secret, github_secret_name: GHCR_PULL_TOKEN }
    rotation_policy: { cadence: every_90_days_or_on_demand }
    consumed_by:
      - bootstrap-scripts-for-the-v2-docker-swarm-cluster/scripts/node-bootstrap.sh
    classification: { blast_radius: read_only_image_pull, access_pattern: per_deploy, sensitivity: medium }


