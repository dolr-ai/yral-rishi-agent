#       Creates yral-agent-public-web-overlay this stack attaches to.
# - ../secrets-manifest.yaml
#       Declares CADDY-related secrets (e.g. ACME account email if we ever
#       move off `tls internal` to real Let's Encrypt on the v2 cluster).
# - generate-caddy-swarm-config.sh (future deliverable)
#       Renders the Caddyfile body + creates the SHA-rotating Swarm config.
# - The rishi-1/2 Caddy snippet PR (Day 7 deliverable, against
#       dolr-ai/yral-rishi-hetzner-infra-template per CONSTRAINTS A2)
#       reverse-proxies into this Swarm service over `https://rishi-4:443
#       https://rishi-5:443`.
