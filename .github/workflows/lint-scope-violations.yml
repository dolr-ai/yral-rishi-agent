# ╔══════════════════════════════════════════════════════════════════════╗
# ║  WORKFLOW: lint-scope-violations.yml                                    ║
# ║                                                                          ║
# ║  ⭐ THIS FILE IN ONE SENTENCE                                            ║
# ║  Blocks PRs that touch files outside the owning session's scope.        ║
# ║                                                                          ║
# ║  📖 EXPLAINED FOR A NON-PROGRAMMER                                       ║
# ║  We have 5 sessions (1, 2, 3, 4, 5) each owning a specific subfolder    ║
# ║  in the monorepo. When session-N opens a PR (branch name starts with    ║
# ║  "session-N/"), this lint checks that ONLY files inside session-N's     ║
# ║  owned scope are changed. If a session-3 PR tries to edit a session-4   ║
# ║  file, this workflow blocks the merge. Defense-in-depth so sessions     ║
# ║  don't accidentally step on each other's work.                          ║
# ║                                                                          ║
# ║  🔗 HOW IT FITS                                                          ║
# ║  - Triggered: every pull_request to main                                 ║
# ║  - Reads: branch name to determine session ownership                    ║
# ║  - Reads: scope map from 01-SESSION-SHARDING-AND-OWNERSHIP.md           ║
# ║  - Defends: I8 (session sharding) + I9 (Auto-mode forbidden ops)        ║
# ║                                                                          ║
# ║  ⭐ START HERE                                                           ║
# ║  The `validate-scope` job is the only logic here. It maps branch        ║
# ║  prefix to allowed paths, then diffs.                                   ║
# ║                                                                          ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Lint Scope Violations

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-scope:
    name: Verify PR stays in owning session's scope
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Determine session from branch name
        id: session
        run: |
          # Branch convention: session-N/<feature> per I8
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" =~ ^session-([0-9]+)/ ]]; then
            SESSION_NUM="${BASH_REMATCH[1]}"
            echo "session=$SESSION_NUM" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" =~ ^coordinator/ ]]; then
            echo "session=coordinator" >> $GITHUB_OUTPUT
          else
            echo "::warning::Branch name doesn't follow session-N/ or coordinator/ pattern: $BRANCH"
            echo "session=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Compute changed files
        id: files
        run: |
          git fetch origin main
          # All files touched in this PR (added, modified, deleted)
          git diff --name-only origin/main...HEAD > /tmp/changed-files.txt
          echo "Changed file count: $(wc -l < /tmp/changed-files.txt)"
          cat /tmp/changed-files.txt

      - name: Validate scope per session
        run: |
          SESSION="${{ steps.session.outputs.session }}"
          VIOLATIONS=0

          # Define scope per session — must match 01-SESSION-SHARDING-AND-OWNERSHIP.md
          # Coordinator can touch anything (including these workflow files)
          # ALSO allowed for every session: their own SESSION-N-LOG.md +
          # SESSION-N-STATE.md + appending to cross-session-dependencies.md
          # (these live in coordinator scope but sessions MUST update them
          # per I11/I12). And the latency-baseline folder lives nested
          # under plan-and-discussions/ in the actual repo (DEP-001 fix
          # 2026-05-04 — Session 1 caught this).
          declare -A SESSION_PATHS
          # Common per-session paths (own log + state files, cross-session-deps file)
          COMMON_SESSION_PATHS="yral-rishi-agent-plan-and-discussions/multi-session-parallel-build-coordination/session-logs/SESSION-${SESSION}-LOG\.md|yral-rishi-agent-plan-and-discussions/multi-session-parallel-build-coordination/session-state/SESSION-${SESSION}-STATE\.md|yral-rishi-agent-plan-and-discussions/multi-session-parallel-build-coordination/cross-session-dependencies\.md"
          SESSION_PATHS[1]="bootstrap-scripts-for-the-v2-docker-swarm-cluster/|yral-rishi-agent-plan-and-discussions/latency-baseline-capture-from-live-services-the-numbers-v2-must-beat/scripts/|${COMMON_SESSION_PATHS}"
          SESSION_PATHS[2]="yral-rishi-agent-new-service-template/|yral-rishi-agent-hello-world/|${COMMON_SESSION_PATHS}"
          SESSION_PATHS[3]="yral-rishi-agent-public-api/|${COMMON_SESSION_PATHS}"
          SESSION_PATHS[4]="yral-rishi-agent-conversation-turn-orchestrator/|yral-rishi-agent-soul-file-library/|yral-rishi-agent-influencer-and-profile-directory/|${COMMON_SESSION_PATHS}"
          SESSION_PATHS[5]="yral-rishi-agent-user-memory-service/|etl-scripts/|tests/|${COMMON_SESSION_PATHS}"

          # Coordinator allowlist — explicit per ownership doc (D.3 fix
          # 2026-05-05; Codex flagged blanket bypass on PR #5 as a scope
          # loophole). Coordinator owns: plan-and-discussions, shared lib,
          # entire .github + .claude trees, root README + .gitignore + LICENSE,
          # and (historically) interface-contracts at the old location.
          # Root-file entries END-ANCHORED with $ so `README.md.bak` or
          # `LICENSE-old` can't slip through (Codex flagged this 2026-05-05).
          # Directory entries keep trailing slash for prefix-match.
          COORDINATOR_PATHS="yral-rishi-agent-plan-and-discussions/|shared-library-code-used-by-every-v2-service/|\.github/|\.claude/|interface-contracts/|README\.md$|\.gitignore$|LICENSE$"

          if [ "$SESSION" = "coordinator" ]; then
            ALLOWED="$COORDINATOR_PATHS"
            echo "Coordinator branch — checking against explicit allowlist"
          elif [ "$SESSION" = "unknown" ]; then
            echo "::error::Branch must start with session-N/ or coordinator/"
            exit 1
          else
            ALLOWED="${SESSION_PATHS[$SESSION]}"
            if [ -z "$ALLOWED" ]; then
              echo "::error::No scope defined for session-$SESSION"
              exit 1
            fi
          fi

          # Check each changed file against the allowed pattern
          while IFS= read -r file; do
            if [[ "$file" =~ ^($ALLOWED) ]]; then
              echo "✅ $file (in session-$SESSION scope)"
            else
              echo "❌ $file (OUT OF SCOPE for session-$SESSION)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < /tmp/changed-files.txt

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "::error::$VIOLATIONS files outside session-$SESSION's scope. See 01-SESSION-SHARDING-AND-OWNERSHIP.md"
            echo "If you need a file in another scope, request it from coordinator (don't edit directly)."
            exit 1
          fi

          echo ""
          echo "✅ All $(wc -l < /tmp/changed-files.txt) changed files are in session-$SESSION's scope"
